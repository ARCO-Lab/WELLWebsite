events {}

http {
    # Local development reverse proxy for WordPress only.
    # Dashboard is NOT proxied here; access it directly on port 8081.
    # On the McMaster VM with an external reverse proxy you can omit this file/container.

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://wordpress:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
