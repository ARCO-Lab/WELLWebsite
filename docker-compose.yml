services:
  # --- MySQL + WordPress (unchanged logic, just hardcoded ports/env) ---
  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress

  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    volumes:
      - ./home:/var/www/html
    ports:
      - "8080:80"      # WordPress exposed here
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress

  # --- Flask backend (Gunicorn, hardcoded port/env) ---
  backend:
    build:
      context: ./dashboard/backend
    env_file:
      - ./dashboard/backend/app/.env
    environment:
      DATABASE_URL: "postgresql://welluser:YOUR_PASSWORD@host.docker.internal:5432/welldb"
      BACKEND_PORT: 5000
    expose:
      - "5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # --- Worker (Python script) ---
  worker:
    build:
      context: ./dashboard/backend
    command: ["python","app/scripts/scheduler.py"]
    env_file:
      - ./dashboard/backend/app/.env
    environment:
      DATABASE_URL: "postgresql://welluser:YOUR_PASSWORD@host.docker.internal:5432/welldb"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # --- Next.js dashboard frontend ---
  dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: "http://backend:5000"
        NEXT_PUBLIC_FLASK_API_URL: "/api"
    env_file:
      - ./dashboard/frontend/.env.local
    environment:
      FLASK_API_URL: "http://backend:5000"
      NEXT_PUBLIC_FLASK_API_URL: "/api"
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""
      OPENAI_API_KEY: ""
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8081:8081"
    restart: always

volumes:
  db_data:
