# Docker Compose file to orchestrate WordPress, MySQL, a Next.js dashboard, and Nginx reverse proxy.
services:
  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}

  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    volumes:
      - ./home:/var/www/html
    # Always bind WordPress container port 80 to host 8080 (local dev & VM)
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress

  dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
      args:
        FLASK_API_URL: ${FLASK_API_URL_DOCKER}
        NEXT_PUBLIC_FLASK_API_URL: ${NEXT_PUBLIC_FLASK_API_URL}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: always
    # Bind dashboard internal port 8081 to host 8081
    ports:
      - "8081:8081"
    environment:
      FLASK_API_URL: ${FLASK_API_URL_DOCKER}
      NEXT_PUBLIC_FLASK_API_URL: ${NEXT_PUBLIC_FLASK_API_URL}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  # Optional internal reverse proxy. If the McMaster VM already has an external
  # reverse proxy, you can comment out or remove this service. Keeping it here
  # for local development: visiting http://localhost will serve WordPress and
  # http://localhost/dashboard will proxy to the dashboard. For the VM requirement
  # (direct 8080/8081), this container is NOT required.
  proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wordpress
      - dashboard
    restart: always

volumes:
  db_data:
