version: "3.9"

volumes:
  db_data:

services:
  # --- WordPress + MySQL as you had ---
  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}

  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    volumes:
      - ./home:/var/www/html
    ports:
      - "${WORDPRESS_PORT}:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress

  # --- Flask backend (Gunicorn), no public port ---
  backend:
    build:
      context: ./dashboard/backend
      # dockerfile: Dockerfile   # optional if named "Dockerfile"
    env_file:
      - ./dashboard/backend/app/.env   # your existing backend .env (HOBOLINK, WQ, etc.)
    environment:
      # Override DB URL at runtime so you don't edit the backend .env for Docker
      DATABASE_URL: ${BACKEND_DATABASE_URL}
      # If you also want to drive the port via env:
      BACKEND_PORT: ${BACKEND_PORT}
    expose:
      - "${BACKEND_PORT}"              # internal-only
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets container reach host/VM if needed
    restart: unless-stopped

  # --- Worker (same image), runs your Python script loop ---
  worker:
    build:
      context: ./dashboard/backend
    command: ["python","app/scripts/scheduler.py"]     # adjust path if different
    env_file:
      - ./dashboard/backend/app/.env
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # --- Next.js frontend ---
  dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
      args:
        # Build-time only (for next.config.js rewrites & public env)
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL}
        NEXT_PUBLIC_FLASK_API_URL: ${NEXT_PUBLIC_FLASK_API_URL}
    env_file:
      - ./dashboard/frontend/.env.local  # runtime server-side vars if you have any
    environment:
      # Runtime (Node/SSR or API routes) can also use these:
      FLASK_API_URL: ${BACKEND_INTERNAL_URL}
      NEXT_PUBLIC_FLASK_API_URL: ${NEXT_PUBLIC_FLASK_API_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${DASHBOARD_PORT}:8081"
    restart: always
