volumes:
  db_data:
  exports_data:

networks:
  front:
  internal_api:

services:
  # --- WordPress + MySQL as you had ---
  db:
    image: mysql:5.7
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    networks:
      - front
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}

  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    volumes:
      - ./home:/var/www/html
    ports:
      - "8080:80"
    restart: always
    networks:
      - front
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
      DEPLOYMENT: ${DEPLOYMENT:-DEV}
      # Ensure site/home URLs point to the correct port to avoid redirects to :80
      WP_HOME: ${WP_HOME}
      WP_SITEURL: ${WP_SITEURL}
      # External dashboard base URL for theme template embedding
      DASHBOARD_URL: ${DASHBOARD_URL}

  # --- Flask backend (Gunicorn), no public port ---
  backend:
    build:
      context: ./dashboard/backend
      # dockerfile: Dockerfile   # optional if named "Dockerfile"
    env_file:
      - ./dashboard/backend/app/.env   # your existing backend .env (HOBOLINK, WQ, etc.)
    environment:
      # Override DB URL at runtime so you don't edit the backend .env for Docker
      DATABASE_URL: ${BACKEND_DATABASE_URL}
      # If you also want to drive the port via env:
      BACKEND_PORT: ${BACKEND_PORT}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      EXPORTS_DIR: ${EXPORTS_DIR:-/app/app/exports}
    expose:
      - "${BACKEND_PORT}"              # internal-only
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets container reach host/VM if needed
    restart: unless-stopped
    networks:
      - internal_api
    volumes:
      - exports_data:/app/app/exports

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal_api

  # --- Worker (same image), runs your Python script loop ---
  worker:
    build:
      context: ./dashboard/backend
    command: ["python","scripts/scheduler_temp.py"]     # correct path from /app/app working directory
    env_file:
      - ./dashboard/backend/app/.env
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL}
      # Set to 1 to mirror logs to Docker stdout in addition to files
      WORKER_LOG_TO_STDOUT: ${WORKER_LOG_TO_STDOUT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal_api
    volumes:
      # Persist worker logs on host for easy access
      - ./dashboard/backend/app/logs:/app/app/logs

  export_worker:
    build:
      context: ./dashboard/backend
    command: ["celery", "-A", "tasks.celery_app.celery_app", "worker", "--loglevel=info"]
    env_file:
      - ./dashboard/backend/app/.env
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      EXPORTS_DIR: ${EXPORTS_DIR:-/app/app/exports}
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - internal_api
    volumes:
      - exports_data:/app/app/exports

  # --- Next.js frontend ---
  dashboard:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
      args:
        # Build-time only (for next.config.js rewrites & public env)
        FLASK_API_URL: ${BACKEND_INTERNAL_URL}
        NEXT_PUBLIC_FLASK_API_URL: ${NEXT_PUBLIC_FLASK_API_URL}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    env_file:
      - ./dashboard/frontend/.env.local  # runtime server-side vars if you have any
    environment:
      # Runtime (Node/SSR or API routes) can also use these:
      FLASK_API_URL: ${BACKEND_INTERNAL_URL}
      NEXT_PUBLIC_FLASK_API_URL: ${NEXT_PUBLIC_FLASK_API_URL}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${DASHBOARD_PORT}:8081"
    restart: always
    networks:
      - internal_api

  # Optional internal reverse proxy. If the McMaster VM already has an external
  # reverse proxy, you can comment out or remove this service. Keeping it here
  # for local development: visiting http://localhost will serve WordPress. For 
  # the VM requirement (direct 8080/8081), this container is NOT required.

